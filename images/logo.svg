<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 90" width="300" height="90" role="img" aria-label="MAG Group Scaffolding">
  <!-- MAG -->
  <text x="150" y="50"
        text-anchor="middle"
        font-family="Impact,'Arial Black',Arial,sans-serif"
        font-weight="900" font-size="54" fill="#1E88E5" letter-spacing="6">MAG</text>

  <!-- Red lines — aligned to SCAFFOLDING edges (x=45 to x=255, GROUP gap 8px each side) -->
  <rect x="45"  y="61" width="69" height="2.5" fill="#E21D25"/>
  <rect x="186" y="61" width="69" height="2.5" fill="#E21D25"/>

  <!-- GROUP -->
  <text x="150" y="65"
        text-anchor="middle"
        font-family="Arial,Helvetica,sans-serif"
        font-weight="700" font-size="11" fill="#ffffff"
        textLength="56" lengthAdjust="spacing">GROUP</text>

  <!-- SCAFFOLDING — slightly fatter -->
  <text x="150" y="87"
        text-anchor="middle"
        font-family="Impact,'Arial Black',Arial,sans-serif"
        font-weight="900" font-size="22" fill="#E21D25"
        textLength="210" lengthAdjust="spacingAndGlyphs">SCAFFOLDING</text>
</svg>
